<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Hello Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-white max-w-md w-full rounded-2xl shadow-xl border border-gray-100 p-8 text-center space-y-6">
        
        <div class="mx-auto w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl shadow-sm">
            ✓
        </div>

        <div class="space-y-2">
            <h1 class="text-2xl font-black text-gray-900 tracking-tight">Payment Complete!</h1>
            <p class="text-sm text-gray-500">Your transaction has processed successfully. Your airtime or data bundle package is being delivered instantly to your handset.</p>
        </div>

        <div class="bg-gray-50 border border-gray-100 rounded-xl p-4 text-left">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">Stripe Tracking Reference</span>
            <span class="text-xs font-mono font-bold text-gray-700 block break-all mt-1" th:text="${sessionId}">cs_test_placeholder</span>
        </div>

        <div>
            <a href="/" class="block w-full bg-gray-900 hover:bg-red-600 text-white font-bold py-3.5 rounded-xl text-sm transition shadow-md">
                Return to Storefront
            </a>
        </div>
        
    </div>

</body>
</html>
