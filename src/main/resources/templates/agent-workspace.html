<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Buddy - Agent Support Desk</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images.png}" href="images.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between border-b-2 border-red-600 shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🎧</span>
            <div>
                <h1 class="text-lg font-extrabold tracking-wide" th:text="${agent.fullName}">Support Agent</h1>
                <p class="text-[10px] text-gray-400">Global Customer Thread Manager</p>
            </div>
        </div>
        <div class="flex items-center space-x-2 bg-gray-800 px-3 py-1.5 rounded-xl border border-gray-700">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-xs font-semibold text-gray-300">Active Pool Only</span>
        </div>
    </header>

    <div class="flex-grow flex overflow-hidden">
        
        <aside class="w-80 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100 bg-gray-50">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Assigned to Me</h2>
            </div>
            <div id="threadList" class="flex-grow overflow-y-auto divide-y divide-gray-100">
                <div id="noThreadsMsg" class="p-8 text-center text-xs text-gray-400 mt-10">
                    <span class="text-3xl block mb-2">☕</span>
                    No active requests yet.
                </div>
            </div>
        </aside>

        <main class="flex-grow flex flex-col bg-gray-50 overflow-hidden">
            <div class="bg-white border-b border-gray-200 p-4 flex items-center justify-between">
                <div>
                    <h3 id="activeChatHeaderName" class="font-extrabold text-gray-800 text-sm">Select a Conversation Thread</h3>
                    <p id="activeChatHeaderStatus" class="text-[10px] text-gray-400">Ready to accept incoming clients</p>
                </div>
            </div>

            <div id="agentMessagesStream" class="flex-grow p-6 overflow-y-auto space-y-4 text-xs leading-relaxed flex flex-col">
                <div class="m-auto text-center text-gray-400">
                    <span class="text-5xl block mb-2">💬</span>
                    <p class="text-sm">Click an active client thread on the sidebar to read and write messages.</p>
                </div>
            </div>

			<form id="agentReplyForm" onsubmit="sendAgentReply(event)" class="p-4 bg-white border-t border-gray-200 flex flex-col space-y-2 hidden">
			    <div class="flex items-center space-x-2.5 pb-1 border-b border-gray-50">
			        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mr-2">Quick Emojis:</span>
			        <button type="button" onclick="insertAgentEmoji('😊')" class="hover:scale-125 transition text-base">😊</button>
			        <button type="button" onclick="insertAgentEmoji('😂')" class="hover:scale-125 transition text-base">😂</button>
			        <button type="button" onclick="insertAgentEmoji('👏')" class="hover:scale-125 transition text-base">👏</button>
			        <button type="button" onclick="insertAgentEmoji('😢')" class="hover:scale-125 transition text-base">😢</button>
			        <button type="button" onclick="insertAgentEmoji('😡')" class="hover:scale-125 transition text-base">😡</button>
			        <button type="button" onclick="insertAgentEmoji('😞')" class="hover:scale-125 transition text-base">😞</button>
			        <button type="button" onclick="insertAgentEmoji('👍')" class="hover:scale-125 transition text-base">👍</button>
			    </div>
			
			    <div class="flex items-center space-x-3">
			        <input type="text" id="agentReplyInput" required autocomplete="off" class="flex-grow p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs focus:outline-none focus:border-red-500 focus:bg-white transition" placeholder="Type your formal agent response here...">
			        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl text-xs font-bold transition shadow-md shadow-red-100">
			            Send Reply
			        </button>
			    </div>
			</form>
        </main>
    </div>

    <script th:inline="javascript">
    /*<![CDATA[*/
    const currentAgentId = /*[[${agent.id}]]*/ '1';
    const currentAgentName = /*[[${agent.fullName}]]*/ 'Agent';
    /*]]>*/

    let stompClient = null;
    let activeThreadId = null;
    const threads = {};
    window.onload = function() {
        connectAgentDashboard();
        loadOfflineActiveThreads();
    };

    function loadOfflineActiveThreads() {
        fetch('/api/chat/active-threads')
            .then(response => response.json())
            .then(latestMessages => {
                latestMessages.forEach(msg => {
                    const id = msg.threadId;
                    
                    addMessageToThreadState(id, msg);
                    
                    subscribeToIndividualThread(id);
                });
                
                if (latestMessages.length > 0) {
                    const noThreads = document.getElementById('noThreadsMsg');
                    if (noThreads) noThreads.style.display = 'none';
                }
                
                renderThreadSidebar();
            })
            .catch(err => console.error("Error seeding initial offline threads:", err));
    }

    function connectAgentDashboard() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            stompClient.subscribe('/topic/agent-' + currentAgentId, function (response) {
                const msg = JSON.parse(response.body);
                handleIncomingDashboardMessage(msg);
            });
        });
    }

    function subscribeToIndividualThread(id) {
        if (stompClient && stompClient.connected) {
            stompClient.subscribe('/topic/thread/' + id, function(response) {
                const threadMessage = JSON.parse(response.body);
                
                // Route message safely through central appender
                addMessageToThreadState(id, threadMessage);
                
                renderThreadSidebar();
                if (activeThreadId === id) {
                    renderMessages(id);
                }
            });
        } else {
            setTimeout(() => subscribeToIndividualThread(id), 500);
        }
    }

    function handleIncomingDashboardMessage(msg) {
        const id = msg.threadId;

        if (!threads[id]) {
            const noThreads = document.getElementById('noThreadsMsg');
            if (noThreads) noThreads.style.display = 'none';
            subscribeToIndividualThread(id);
        }

        addMessageToThreadState(id, msg);

        renderThreadSidebar();
        if (activeThreadId === id) {
            renderMessages(id);
        }
    }

    function selectThread(threadId) {
        activeThreadId = threadId;
        const thread = threads[threadId];

        document.getElementById('activeChatHeaderName').innerText = thread.customerName;
        document.getElementById('activeChatHeaderStatus').innerText = "Assigned Routing ID: " + threadId;
        document.getElementById('agentReplyForm').classList.remove('hidden');

        fetch('/api/chat/history/' + threadId)
            .then(response => response.json())
            .then(history => {
                history.forEach(historyMsg => {
                    addMessageToThreadState(threadId, historyMsg);
                });

                renderThreadSidebar();
                renderMessages(threadId);
            })
            .catch(err => console.error("Error loading chat history:", err));
    }

    function renderThreadSidebar() {
        const list = document.getElementById('threadList');
        list.innerHTML = '';

        Object.values(threads).forEach(thread => {
            const button = document.createElement('button');
            button.onclick = () => selectThread(thread.threadId);
            
            // Get the latest message to extract its timestamp and text
            const lastMsg = thread.messages[thread.messages.length - 1];
            const snippet = lastMsg ? lastMsg.message : "No messages";
            
            // 👉 Get the friendly date/time string using our helper
            const timeDisplay = lastMsg ? formatChatDate(lastMsg.timestamp) : "Just now";

            button.className = `w-full text-left p-4 transition flex flex-col space-y-1 ${
                activeThreadId === thread.threadId ? 'bg-red-50/70 border-l-4 border-red-600' : 'hover:bg-gray-50'
            }`;

            button.innerHTML = `
                <div class="flex items-center justify-between">
                    <span class="font-extrabold text-xs text-gray-800">${thread.customerName}</span>
                    <span class="text-[9px] text-gray-400 font-semibold">${timeDisplay}</span>
                </div>
                <p class="text-[11px] text-gray-500 truncate w-64">${snippet}</p>
            `;
            list.appendChild(button);
        });
    }

    function sendAgentReply(event) {
        event.preventDefault();
        const replyInput = document.getElementById('agentReplyInput');
        const messageText = replyInput.value.trim();

        if (!messageText || !activeThreadId) return;

        const replyPayload = {
            threadId: activeThreadId,
            sender: 'agent',
            senderName: currentAgentName,
            message: messageText,
            timestamp: Date.now()
        };

        if (stompClient && stompClient.connected) {
            stompClient.send("/app/chat.send", {}, JSON.stringify(replyPayload));
        }

        replyInput.value = '';
    }
    
    function insertAgentEmoji(emoji) {
        const input = document.getElementById('agentReplyInput');
        input.value += emoji;
        input.focus();
    }

    function addMessageToThreadState(threadId, msg) {
        if (!threads[threadId]) {
            threads[threadId] = {
                threadId: threadId,
                customerName: msg.senderName,
                messages: []
            };
        }

        // Check if the message is actually an edit update to an existing message
        const existingIndex = threads[threadId].messages.findIndex(m => m.id === msg.id);
        if (existingIndex !== -1) {
            // Update the message in-place
            threads[threadId].messages[existingIndex] = msg;
            return;
        }

        // Normal Deduplication for brand-new incoming entries
        const isDuplicate = threads[threadId].messages.some(m => 
            (msg.id && m.id === msg.id) || 
            (m.message === msg.message && m.sender === msg.sender && Math.abs(Number(m.timestamp) - Number(msg.timestamp)) < 1500)
        );

        if (!isDuplicate) {
            threads[threadId].messages.push(msg);
            threads[threadId].messages.sort((a, b) => Number(a.timestamp) - Number(b.timestamp));
        }
    }

    function renderMessages(threadId) {
        const container = document.getElementById('agentMessagesStream');
        container.innerHTML = '';
        
        const thread = threads[threadId];
        if (!thread) return;

        thread.messages.forEach(msg => {
            const isAgent = msg.sender === 'agent';
            
            const wrapper = document.createElement('div');
            wrapper.className = `flex flex-col ${isAgent ? 'items-end' : 'items-start'}`;

            const label = document.createElement('span');
            label.className = 'text-[9px] text-gray-400 font-bold mb-0.5 px-1';
            label.innerText = isAgent ? 'You (' + currentAgentName + ')' : msg.senderName;

            const bubbleContainer = document.createElement('div');
            bubbleContainer.className = 'flex items-center space-x-2 max-w-[75%] group';

            const bubble = document.createElement('div');
            bubble.className = `rounded-2xl px-3.5 py-2.5 shadow-sm ${
                isAgent 
                ? 'bg-gray-900 text-white rounded-tr-none' 
                : 'bg-white text-gray-800 border border-gray-200 rounded-tl-none'
            }`;
            
            const messageTextSpan = document.createElement('span');
            messageTextSpan.innerText = msg.message;
            bubble.appendChild(messageTextSpan);
            bubbleContainer.appendChild(bubble);

            // Append edit button next to agent's own sent messages
            if (isAgent) {
                const editBtn = document.createElement('button');
                editBtn.className = 'hidden group-hover:block text-[10px] text-gray-400 hover:text-red-600 transition';
                editBtn.innerText = '✍️';
                editBtn.onclick = () => triggerAgentMessageEdit(msg.id, msg.message);
                
                // Put the edit button before the bubble for right aligned layout
                bubbleContainer.insertBefore(editBtn, bubble);
            }

            wrapper.appendChild(label);
            wrapper.appendChild(bubbleContainer);
            container.appendChild(wrapper);
        });

        container.scrollTop = container.scrollHeight;
    }

    function triggerAgentMessageEdit(messageId, oldText) {
        const newText = prompt("Edit your agent message:", oldText);
        if (newText !== null && newText.trim() !== "" && newText !== oldText) {
            const editPayload = {
                id: messageId,
                threadId: activeThreadId,
                sender: 'agent',
                senderName: currentAgentName,
                message: newText.trim(),
                timestamp: Date.now()
            };
            
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/chat.edit", {}, JSON.stringify(editPayload));
            }
        }
    }
    
    function formatChatDate(timestamp) {
        if (!timestamp) return "";
        const date = new Date(Number(timestamp));
        const now = new Date();
        
        // Check if the message was sent today
        const isToday = date.getDate() === now.getDate() &&
                        date.getMonth() === now.getMonth() &&
                        date.getFullYear() === now.getFullYear();

        // Check if the message was sent yesterday
        const yesterday = new Date(now);
        yesterday.setDate(now.getDate() - 1);
        const isYesterday = date.getDate() === yesterday.getDate() &&
                            date.getMonth() === yesterday.getMonth() &&
                            date.getFullYear() === yesterday.getFullYear();

        const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: false };
        const timeString = date.toLocaleTimeString([], timeOptions);

        if (isToday) {
            return timeString;
        } else if (isYesterday) {
            return "Yesterday, " + timeString;
        } else {
            // e.g., "16 Jul, 13:44"
            const day = date.getDate();
            const month = date.toLocaleString('default', { month: 'short' });
            return `${day} ${month}, ${timeString}`;
        }
    }
    </script>
</body>
</html>
