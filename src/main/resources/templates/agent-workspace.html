<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Buddy - Agent Support Desk</title>
    <link rel="icon" type="image/x-icon" th:href="@{/images.png}" href="images.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-gray-900 text-white px-6 py-4 flex items-center justify-between border-b-2 border-red-600 shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🎧</span>
            <div>
                <h1 class="text-lg font-extrabold tracking-wide" th:text="${agent.fullName}">Support Agent</h1>
                <p class="text-[10px] text-gray-400">Global Customer Thread Manager</p>
            </div>
        </div>
        <div class="flex items-center space-x-2 bg-gray-800 px-3 py-1.5 rounded-xl border border-gray-700">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-xs font-semibold text-gray-300">Active Pool Only</span>
        </div>
    </header>

    <div class="flex-grow flex overflow-hidden">
        
        <aside class="w-80 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100 bg-gray-50">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Assigned to Me</h2>
            </div>
            <div id="threadList" class="flex-grow overflow-y-auto divide-y divide-gray-100">
                <div id="noThreadsMsg" class="p-8 text-center text-xs text-gray-400 mt-10">
                    <span class="text-3xl block mb-2">☕</span>
                    No active requests yet.
                </div>
            </div>
        </aside>

        <main class="flex-grow flex flex-col bg-gray-50 overflow-hidden">
            <div class="bg-white border-b border-gray-200 p-4 flex items-center justify-between">
                <div>
                    <h3 id="activeChatHeaderName" class="font-extrabold text-gray-800 text-sm">Select a Conversation Thread</h3>
                    <p id="activeChatHeaderStatus" class="text-[10px] text-gray-400">Ready to accept incoming clients</p>
                </div>
            </div>

            <div id="agentMessagesStream" class="flex-grow p-6 overflow-y-auto space-y-4 text-xs leading-relaxed flex flex-col">
                <div class="m-auto text-center text-gray-400">
                    <span class="text-5xl block mb-2">💬</span>
                    <p class="text-sm">Click an active client thread on the sidebar to read and write messages.</p>
                </div>
            </div>

            <form id="agentReplyForm" onsubmit="sendAgentReply(event)" class="p-4 bg-white border-t border-gray-200 flex items-center space-x-3 hidden">
                <input type="text" id="agentReplyInput" required autocomplete="off" class="flex-grow p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs focus:outline-none focus:border-red-500 focus:bg-white transition" placeholder="Type your formal agent response here...">
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl text-xs font-bold transition shadow-md shadow-red-100">
                    Send Reply
                </button>
            </form>
        </main>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const currentAgentId = /*[[${agent.id}]]*/ '1';
        const currentAgentName = /*[[${agent.fullName}]]*/ 'Agent';
        /*]]>*/

        let stompClient = null;
        let activeThreadId = null;
        const threads = {};

        function connectAgentDashboard() {
            const socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function (frame) {
                // EXCLUSIVE FILTER SUBSCRIPTION: Only listen to messages directed to this specific agent ID
                stompClient.subscribe('/topic/agent-' + currentAgentId, function (response) {
                    const msg = JSON.parse(response.body);
                    handleIncomingDashboardMessage(msg);
                });
            });
        }

        function handleIncomingDashboardMessage(msg) {
            const id = msg.threadId;

            if (!threads[id]) {
                threads[id] = {
                    threadId: id,
                    customerName: msg.senderName,
                    messages: []
                };
                
                const noThreads = document.getElementById('noThreadsMsg');
                if (noThreads) noThreads.style.display = 'none';

                stompClient.subscribe('/topic/thread/' + id, function(response) {
                    const threadMessage = JSON.parse(response.body);
                    const alreadyExists = threads[id].messages.some(m => m.timestamp === threadMessage.timestamp && m.message === threadMessage.message);
                    if (!alreadyExists) {
                        threads[id].messages.push(threadMessage);
                        if (activeThreadId === id) {
                            renderMessages(id);
                        }
                    }
                });
            }

            const alreadyExists = threads[id].messages.some(m => m.timestamp === msg.timestamp && m.message === msg.message);
            if (!alreadyExists) {
                threads[id].messages.push(msg);
            }

            renderThreadSidebar();
            if (activeThreadId === id) {
                renderMessages(id);
            }
        }

        function renderThreadSidebar() {
            const list = document.getElementById('threadList');
            list.innerHTML = '';

            Object.values(threads).forEach(thread => {
                const button = document.createElement('button');
                button.onclick = () => selectThread(thread.threadId);
                
                const lastMsg = thread.messages[thread.messages.length - 1];
                const snippet = lastMsg ? lastMsg.message : "No messages";

                button.className = `w-full text-left p-4 transition flex flex-col space-y-1 ${
                    activeThreadId === thread.threadId ? 'bg-red-50/70 border-l-4 border-red-600' : 'hover:bg-gray-50'
                }`;

                button.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="font-extrabold text-xs text-gray-800">${thread.customerName}</span>
                        <span class="text-[9px] text-gray-400">Assigned</span>
                    </div>
                    <p class="text-[11px] text-gray-500 truncate w-64">${snippet}</p>
                `;
                list.appendChild(button);
            });
        }

        function selectThread(threadId) {
            activeThreadId = threadId;
            const thread = threads[threadId];

            document.getElementById('activeChatHeaderName').innerText = thread.customerName;
            document.getElementById('activeChatHeaderStatus').innerText = "Assigned Routing ID: " + threadId;
            document.getElementById('agentReplyForm').classList.remove('hidden');

            renderThreadSidebar();
            renderMessages(threadId);
        }

        function renderMessages(threadId) {
            const container = document.getElementById('agentMessagesStream');
            container.innerHTML = '';
            
            const thread = threads[threadId];
            if (!thread) return;

            thread.messages.forEach(msg => {
                const isAgent = msg.sender === 'agent';
                
                const wrapper = document.createElement('div');
                wrapper.className = `flex flex-col ${isAgent ? 'items-end' : 'items-start'}`;

                const label = document.createElement('span');
                label.className = 'text-[9px] text-gray-400 font-bold mb-0.5 px-1';
                label.innerText = isAgent ? 'You (' + currentAgentName + ')' : msg.senderName;

                const bubble = document.createElement('div');
                bubble.className = `max-w-[75%] rounded-2xl px-3.5 py-2.5 shadow-sm ${
                    isAgent 
                    ? 'bg-gray-900 text-white rounded-tr-none' 
                    : 'bg-white text-gray-800 border border-gray-200 rounded-tl-none'
                }`;
                bubble.innerText = msg.message;

                wrapper.appendChild(label);
                wrapper.appendChild(bubble);
                container.appendChild(wrapper);
            });

            container.scrollTop = container.scrollHeight;
        }

        function sendAgentReply(event) {
            event.preventDefault();
            const replyInput = document.getElementById('agentReplyInput');
            const messageText = replyInput.value.trim();

            if (!messageText || !activeThreadId) return;

            const replyPayload = {
                threadId: activeThreadId,
                sender: 'agent',
                senderName: currentAgentName,
                message: messageText,
                timestamp: Date.now()
            };

            if (stompClient && stompClient.connected) {
                stompClient.send("/app/chat.send", {}, JSON.stringify(replyPayload));
            }

            replyInput.value = '';
        }

        window.onload = connectAgentDashboard;
    </script>
</body>
</html>
